<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Media Detector</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>AI Media Detector</h1>
    <p class="subtitle">Upload an image or video to estimate how likely it is AI-generated.</p>

    <section class="card uploader">
      <label for="mediaInput" class="upload-label">Choose photo or video</label>
      <input id="mediaInput" type="file" accept="image/*,video/*" />
      <p id="fileInfo" class="file-info">No file selected</p>
    </section>

    <section id="previewSection" class="card preview hidden">
      <h2>Preview</h2>
      <img id="imagePreview" alt="Uploaded preview" class="hidden" />
      <video id="videoPreview" controls class="hidden"></video>
      <canvas id="analysisCanvas" class="hidden"></canvas>
    </section>

    <section id="resultSection" class="card result hidden">
      <h2>Detection Score</h2>
      <div class="meter-wrap">
        <div id="meterBar" class="meter-bar"></div>
      </div>
      <p id="scoreText" class="score-text"></p>
      <p id="verdictText" class="verdict-text"></p>
      <ul id="reasonList" class="reason-list"></ul>
      <p class="disclaimer">
        Note: This is an educational heuristic demo, not a forensic AI detector.
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
